# Cloudflare Pages — bind secrets in the dashboard (not in this file):
#   STRIPE_SECRET_KEY   — Restricted or standard secret key (never expose to the browser)
#   STRIPE_PRICE_ID       — Agentic AI course (e.g. price_1TVnFvJNVnfKQL0g0IgW81bG)
#   STRIPE_VIBE_PRICE_ID  — Vibe Coding bootcamp (e.g. price_1TXaJZJNVnfKQL0gBMQKf0Z3)
# Optional:
#   SITE_URL            — https://yourdomain.com (redirect URLs if Origin header is missing)
#   ALLOWED_ORIGINS     — Comma-separated origins allowed to call this API (CORS)
#   PAYMENTS_GSHEET_WEBHOOK_URL — Apps Script Web App URL used to append rows to the "Payments" sheet
#   DEMO_GSHEET_WEBHOOK_URL — Apps Script URL for /demo registrations (sheet tab: DemoRegistrations)
#   DEMO_GSHEET_SPREADSHEET_ID — optional separate Google Sheet ID for demo registrations
#   BREVO_API_KEY — required for demo registration confirmation emails (same as enquiry form)
#   BREVO_API_KEY — Brevo transactional email (enquiry acknowledgement + lead to admissions)
#   BREVO_SENDER_EMAIL — verified sender (e.g. enquiry@nexpertsacademy.com)
#   BREVO_SENDER_NAME — optional display name
#   ENQUIRY_LEAD_EMAIL — optional; default enquiry@nexpertsacademy.com
#   SITE_PUBLIC_URL — optional canonical site for CTA links in emails
name = "agentic-ai-launchpad"
compatibility_date = "2024-11-01"
pages_build_output_dir = "dist"

